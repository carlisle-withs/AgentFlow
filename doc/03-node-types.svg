<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 650" width="950" height="650">
  <defs>
    <filter id="nodeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="475" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">节点类型体系 (NodeTypeEnum)</text>

  <!-- Category 1: Start/End -->
  <g transform="translate(30, 55)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#e8f8f5" stroke="#11998e" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#11998e">起始/结束节点</text>
    
    <rect x="20" y="40" width="70" height="45" rx="6" fill="white" stroke="#11998e" stroke-width="1.5"/>
    <text x="55" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">START</text>
    <text x="55" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">起始节点</text>
    
    <rect x="110" y="40" width="70" height="45" rx="6" fill="white" stroke="#11998e" stroke-width="1.5"/>
    <text x="145" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">END</text>
    <text x="145" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">结束节点</text>
  </g>

  <!-- Category 2: LLM Nodes -->
  <g transform="translate(260, 55)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#f0f4ff" stroke="#667eea" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#667eea">LLM 节点</text>
    
    <rect x="20" y="40" width="155" height="45" rx="6" fill="white" stroke="#667eea" stroke-width="1.5"/>
    <text x="97" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">spark-llm</text>
    <text x="97" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">大模型对话节点</text>
  </g>

  <!-- Category 3: Knowledge Nodes -->
  <g transform="translate(490, 55)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#fff5e6" stroke="#f7b733" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f7b733">知识库节点</text>
    
    <rect x="15" y="40" width="55" height="45" rx="6" fill="white" stroke="#f7b733" stroke-width="1"/>
    <text x="42" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">KNOWLEDGE</text>
    <text x="42" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">_BASE</text>
    
    <rect x="75" y="40" width="55" height="45" rx="6" fill="white" stroke="#f7b733" stroke-width="1"/>
    <text x="102" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">KNOWLEDGE</text>
    <text x="102" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">_PRO</text>
    
    <rect x="135" y="40" width="50" height="45" rx="6" fill="white" stroke="#f7b733" stroke-width="1"/>
    <text x="160" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">QUESTION</text>
    <text x="160" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">_ANSWER</text>
  </g>

  <!-- Category 4: Logic Control -->
  <g transform="translate(720, 55)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#ffe0cc" stroke="#fc4a1a" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fc4a1a">逻辑控制节点</text>
    
    <rect x="15" y="40" width="55" height="45" rx="6" fill="white" stroke="#fc4a1a" stroke-width="1"/>
    <text x="42" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">IF_ELSE</text>
    <text x="42" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">条件分支</text>
    
    <rect x="75" y="40" width="55" height="45" rx="6" fill="white" stroke="#fc4a1a" stroke-width="1"/>
    <text x="102" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">CODE</text>
    <text x="102" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">代码执行</text>
    
    <rect x="135" y="40" width="50" height="45" rx="6" fill="white" stroke="#fc4a1a" stroke-width="1"/>
    <text x="160" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">DECISION</text>
    <text x="160" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">_MAKING</text>
  </g>

  <!-- Category 5: Iteration -->
  <g transform="translate(30, 180)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#f5e6ff" stroke="#9b59b6" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">迭代节点</text>
    
    <rect x="20" y="40" width="70" height="45" rx="6" fill="white" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="55" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">ITERATION</text>
    <text x="55" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">循环节点</text>
    
    <rect x="110" y="40" width="70" height="45" rx="6" fill="white" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="145" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">ITERATION</text>
    <text x="145" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">_START</text>
    <text x="145" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">迭代开始</text>
  </g>

  <!-- Category 6: Text Processing -->
  <g transform="translate(260, 180)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#e6f5ff" stroke="#3498db" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">文本处理节点</text>
    
    <rect x="20" y="40" width="75" height="45" rx="6" fill="white" stroke="#3498db" stroke-width="1.5"/>
    <text x="57" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">TEXT_</text>
    <text x="57" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">JOINER</text>
    <text x="57" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">文本拼接</text>
    
    <rect x="105" y="40" width="75" height="45" rx="6" fill="white" stroke="#3498db" stroke-width="1.5"/>
    <text x="142" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">PARAMETER</text>
    <text x="142" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">_EXTRACTOR</text>
    <text x="142" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">参数提取</text>
  </g>

  <!-- Category 7: Plugin -->
  <g transform="translate(490, 180)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#fff0f5" stroke="#e91e63" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e91e63">插件节点</text>
    
    <rect x="20" y="40" width="155" height="45" rx="6" fill="white" stroke="#e91e63" stroke-width="1.5"/>
    <text x="97" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">PLUGIN</text>
    <text x="97" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">外部工具/服务调用</text>
  </g>

  <!-- Category 8: External Integration -->
  <g transform="translate(720, 180)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="200" height="100" rx="10" fill="#f0fff0" stroke="#27ae60" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">外部集成节点</text>
    
    <rect x="20" y="40" width="70" height="45" rx="6" fill="white" stroke="#27ae60" stroke-width="1.5"/>
    <text x="55" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">DATABASE</text>
    <text x="55" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">数据库</text>
    
    <rect x="110" y="40" width="70" height="45" rx="6" fill="white" stroke="#27ae60" stroke-width="1.5"/>
    <text x="145" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">RPA</text>
    <text x="145" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">流程自动化</text>
  </g>

  <!-- Node Structure -->
  <g transform="translate(30, 310)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="420" height="170" rx="12" fill="white" stroke="#333" stroke-width="2"/>
    <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">节点数据结构 (Node)</text>
    
    <text x="20" y="55" font-family="Courier New, monospace" font-size="10" fill="#667eea">id: "spark-llm::002"</text>
    <text x="20" y="75" font-family="Courier New, monospace" font-size="10" fill="#666">data: {</text>
    <text x="40" y="95" font-family="Courier New, monospace" font-size="10" fill="#666">nodeMeta: { nodeType, aliasName }</text>
    <text x="40" y="115" font-family="Courier New, monospace" font-size="10" fill="#666">inputs: [ { name, schema: { value } } ]</text>
    <text x="40" y="135" font-family="Courier New, monospace" font-size="10" fill="#666">nodeParam: { modelId, template, ... }</text>
    <text x="40" y="155" font-family="Courier New, monospace" font-size="10" fill="#666">outputs: [ { name } ]</text>
    <text x="20" y="165" font-family="Courier New, monospace" font-size="10" fill="#666">}</text>
  </g>

  <!-- Edge Structure -->
  <g transform="translate(480, 310)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="440" height="170" rx="12" fill="white" stroke="#333" stroke-width="2"/>
    <text x="220" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">边数据结构 (Edge)</text>
    
    <text x="20" y="55" font-family="Courier New, monospace" font-size="10" fill="#667eea">sourceNodeId: "spark-llm::002"</text>
    <text x="20" y="75" font-family="Courier New, monospace" font-size="10" fill="#667eea">targetNodeId: "node-end::003"</text>
    <text x="20" y="95" font-family="Courier New, monospace" font-size="10" fill="#667eea">sourceHandle: "normal_one_of"  // 正常分支</text>
    <text x="20" y="115" font-family="Courier New, monospace" font-size="10" fill="#667eea">                  // 或 "intent_chain" 异常分支</text>
    
    <text x="20" y="145" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">边的类型:</text>
    <rect x="20" y="150" width="80" height="18" rx="4" fill="#e8f8f5" stroke="#11998e"/>
    <text x="60" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">normal_one_of</text>
    <text x="115" y="163" font-family="Arial, sans-serif" font-size="9" fill="#666">→ 正常执行分支</text>
    
    <rect x="200" y="150" width="80" height="18" rx="4" fill="#fff5e6" stroke="#fc4a1a"/>
    <text x="240" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">intent_chain</text>
    <text x="295" y="163" font-family="Arial, sans-serif" font-size="9" fill="#666">→ 异常处理分支</text>
  </g>

  <!-- Node Executor Pattern -->
  <g transform="translate(30, 505)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="890" height="130" rx="12" fill="white" stroke="#333" stroke-width="2"/>
    <text x="445" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">节点执行器模式 (NodeExecutor Pattern)</text>
    
    <!-- Abstract -->
    <rect x="20" y="45" width="200" height="70" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
    <text x="120" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">AbstractNodeExecutor</text>
    <text x="120" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">• 重试/超时控制</text>
    <text x="120" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">• 变量解析/存储</text>
    
    <!-- Arrow -->
    <line x1="225" y1="80" x2="280" y2="80" stroke="#333" stroke-width="2"/>
    <polygon points="280,80 275,76 275,84" fill="#333"/>
    <text x="252" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">implements</text>
    
    <!-- Interface -->
    <rect x="285" y="45" width="150" height="70" rx="8" fill="#e8f8ff" stroke="#4facfe" stroke-width="2"/>
    <text x="360" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">NodeExecutor</text>
    <text x="360" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">interface</text>
    
    <!-- Arrow -->
    <line x1="440" y1="80" x2="495" y2="80" stroke="#333" stroke-width="2"/>
    <polygon points="495,80 490,76 490,84" fill="#333"/>
    <text x="467" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">extends</text>
    
    <!-- Implementations -->
    <rect x="500" y="45" width="380" height="70" rx="8" fill="#f0fff0" stroke="#27ae60" stroke-width="1.5"/>
    <text x="690" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">具体实现 (Component)</text>
    
    <g transform="translate(515, 72)">
      <rect x="0" y="0" width="60" height="32" rx="4" fill="white" stroke="#27ae60" stroke-width="1"/>
      <text x="30" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Start</text>
    </g>
    
    <g transform="translate(585, 72)">
      <rect x="0" y="0" width="60" height="32" rx="4" fill="white" stroke="#27ae60" stroke-width="1"/>
      <text x="30" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">LLM</text>
    </g>
    
    <g transform="translate(655, 72)">
      <rect x="0" y="0" width="60" height="32" rx="4" fill="white" stroke="#27ae60" stroke-width="1"/>
      <text x="30" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Plugin</text>
    </g>
    
    <g transform="translate(725, 72)">
      <rect x="0" y="0" width="60" height="32" rx="4" fill="white" stroke="#27ae60" stroke-width="1"/>
      <text x="30" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">IfElse</text>
    </g>
    
    <g transform="translate(795, 72)">
      <rect x="0" y="0" width="60" height="32" rx="4" fill="white" stroke="#27ae60" stroke-width="1"/>
      <text x="30" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">End</text>
    </g>
  </g>
</svg>
