services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================

  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4
    container_name: agentflow-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: agentflow-console
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/charset.cnf:ro
      - ./mysql:/docker-entrypoint-initdb.d
    networks:
      - agentflow-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: docker.m.daocloud.io/library/redis:7
    container_name: agentflow-redis
    volumes:
      - redis-data:/data
    networks:
      - agentflow-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: docker.m.daocloud.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: agentflow-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    restart: always
    network_mode: host
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================================
  # Application Services
  # ============================================================================

  console-frontend:
    build:
      context: ../../
      dockerfile: docker/agentflow/Dockerfile.frontend
    container_name: agentflow-console-frontend
    environment:
      NGINX_PORT: 1881
      CONSOLE_API_URL: /console-api
      CONSOLE_CASDOOR_URL: ""
      CONSOLE_CASDOOR_ID: ""
    ports:
      - "3000:1881"
    depends_on:
      console-hub:
        condition: service_healthy
    networks:
      - agentflow-network
    restart: always

  console-hub:
    build:
      context: ../../
      dockerfile: docker/agentflow/Dockerfile.backend
    container_name: agentflow-console-hub
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: agentflow-console
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OSS_ENDPOINT: http://minio:9000
      OSS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      OSS_ACCESS_KEY_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OSS_REMOTE_ENDPOINT: http://localhost:9000
      OSS_BUCKET_CONSOLE: console
      WORKFLOW_CHAT_URL: http://core-workflow-java:7880/api/v1/workflow/chat/stream
      WORKFLOW_URL: http://core-workflow-java:7880
      SERVER_PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - agentflow-network
    restart: always

  core-workflow-java:
    build:
      context: ../../
      dockerfile: docker/agentflow/Dockerfile.workflow
    container_name: agentflow-core-workflow-java
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: agentflow-workflow
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_SERVICE_URL: http://console-hub:8080
      OSS_ENDPOINT: http://minio:9000
      OSS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      OSS_ACCESS_KEY_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OSS_REMOTE_ENDPOINT: http://localhost:9000
      SERVER_PORT: 7880
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: agentflow-workflow
    ports:
      - "7880:7880"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - agentflow-network
    restart: always

  # ============================================================================
  # Observability Services
  # ============================================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: agentflow-otel-collector
    volumes:
      - ./otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      - tempo
      - prometheus
    networks:
      - agentflow-network
    restart: always

  tempo:
    image: grafana/tempo:2.4.0
    container_name: agentflow-tempo
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "9095:9095"
    command: [ "-config.file=/etc/tempo.yaml" ]
    networks:
      - agentflow-network
    restart: always

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: agentflow-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - agentflow-network
    restart: always

  loki:
    image: grafana/loki:3.0.0
    container_name: agentflow-loki
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - agentflow-network
    restart: always

  grafana:
    image: grafana/grafana:10.3.0
    container_name: agentflow-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    ports:
      - "3002:3000"
    depends_on:
      - tempo
      - prometheus
      - loki
    networks:
      - agentflow-network
    restart: always

networks:
  agentflow-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  minio-data:
  tempo-data:
  prometheus-data:
  loki-data:
  grafana-data:
