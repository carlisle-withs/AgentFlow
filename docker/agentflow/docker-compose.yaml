services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================

  # MySQL Database
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4
    container_name: agentflow-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: agentflow-console
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Mount MySQL configuration
      - ./mysql/my.cnf:/etc/mysql/conf.d/charset.cnf:ro
      # Mount initialization scripts
      - ./mysql:/docker-entrypoint-initdb.d
    networks:
      - agentflow-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: docker.m.daocloud.io/library/redis:7
    container_name: agentflow-redis
    volumes:
      - redis_data:/data
    networks:
      - agentflow-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO Object Storage
  minio:
    image: docker.m.daocloud.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: agentflow-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - agentflow-network
    restart: always
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================================
  # Application Services
  # ============================================================================

  # Console Frontend
  console-frontend:
    build:
      context: ../../
      dockerfile: docker/agentflow/Dockerfile.frontend
    container_name: agentflow-console-frontend
    environment:
      NGINX_PORT: 1881
      # Configuration for runtime-config.js
      CONSOLE_API_URL: /console-api
      # Adjust these if you have authentication set up
      CONSOLE_CASDOOR_URL: ""
      CONSOLE_CASDOOR_ID: ""
    ports:
      - "3000:1881"
    depends_on:
      console-hub:
        condition: service_healthy
    networks:
      - agentflow-network
    restart: always

  # Console Backend (Hub)
  console-hub:
    build:
      context: ../../
      dockerfile: docker/agentflow/Dockerfile.backend
    container_name: agentflow-console-hub
    environment:
      # Database
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: agentflow-console
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # MinIO
      OSS_ENDPOINT: http://minio:9000
      OSS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      OSS_ACCESS_KEY_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OSS_REMOTE_ENDPOINT: http://localhost:9000
      OSS_BUCKET_CONSOLE: console
      
      # Integration with Workflow
      WORKFLOW_CHAT_URL: http://core-workflow-java:7880/api/v1/workflow/chat/stream
      WORKFLOW_URL: http://core-workflow-java:7880
      
      # Other settings
      SERVER_PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - agentflow-network
    restart: always

  # Core Workflow Java
  core-workflow-java:
    build:
      context: ../../
      dockerfile: docker/agentflow/Dockerfile.workflow
    container_name: agentflow-core-workflow-java
    environment:
      # Database
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: agentflow-workflow
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Integration with Console
      MODEL_SERVICE_URL: http://console-hub:8080
      
      # MinIO
      OSS_ENDPOINT: http://minio:9000
      OSS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      OSS_ACCESS_KEY_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OSS_REMOTE_ENDPOINT: http://localhost:9000
      
      SERVER_PORT: 7880
    ports:
      - "7880:7880"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - agentflow-network
    restart: always

networks:
  agentflow-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:
