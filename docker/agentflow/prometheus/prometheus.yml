global:
  scrape_interval: 15s
  evaluation_interval: 15s
  retention: 30d

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: otel-collector

  - job_name: 'agentflow-workflow'
    static_configs:
      - targets: ['core-workflow-java:7880']
        labels:
          service: agentflow-workflow
    metrics_path: /actuator/prometheus

  - job_name: 'agentflow-console'
    static_configs:
      - targets: ['console-hub:8080']
        labels:
          service: agentflow-console
    metrics_path: /actuator/prometheus

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
